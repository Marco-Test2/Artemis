name: Build - Windows Multi (briefcase)
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_COLOR: "1"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Package
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        target: [ "Windows x64", "Windows ARM64" ]
        include:
          - target: "Windows x64"
            output-format: "app"
            runs-on: "windows-latest"
            platform: "windows"
            pre-command: |
              python -m pip install PySide6
              pyside6-rcc ./artemis.qrc -o artemis/resources.py
          - target: "Windows ARM64"
            output-format: "app"
            runs-on: "windows-11-vs2026-arm"
            platform: "windows"
            pre-command: |
              python -m pip install PySide6
              pyside6-rcc ./artemis.qrc -o artemis/resources.py

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Briefcase
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install briefcase

      - name: Setup Environment
        run: |
          ${{ matrix.pre-command }}

      - name: Build App
        run: |
          briefcase build \
            ${{ matrix.platform }} \
            ${{ matrix.output-format }} \
            --no-input --log \
            ${{ matrix.briefcase-args }}

      - name: Package App
        run: |
          briefcase package \
            ${{ matrix.platform }} \
            ${{ matrix.output-format }} \
            --adhoc-sign --no-input --log \
            ${{ matrix.briefcase-args }}

      - name: Rename MSI to include Architecture
        run: |
          for f in dist/*.msi; do
            if [ -f "$f" ]; then
              TARGET_CLEAN=$(echo "${{ matrix.target }}" | tr ' ' '-')
              BASENAME=$(basename "$f" .msi)
              mv "$f" "dist/${BASENAME}-${TARGET_CLEAN}.msi"
            fi
          done

      - name: Upload Temporary MSI
        uses: actions/upload-artifact@v7
        with:
          name: temp-Artemis-${{ matrix.target }}
          path: dist/*.msi
          if-no-files-found: error

      - name: Upload Log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: Log-Failure-${{ matrix.target }}
          path: logs/*

  merge-installers:
    name: Combine MSIs into single zip
    needs: build
    runs-on: windows-latest
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: Artemis-Windows-Installers
          pattern: temp-Artemis-*
          delete-merged: true
  
